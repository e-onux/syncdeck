# SyncDeck - server block for nginxinc/nginx-unprivileged (listens on 8080).
# The site is served under the /syncdeck/ sub-path so it can sit behind the
# shared sidrelabs.com host alongside the main site. Tuned for a tiny static
# site served from RAM (page cache + open_file_cache).

server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;
    charset      utf-8;

    root  /usr/share/nginx/html;
    index index.html;

    # Keep redirects relative so the public host/scheme/port (behind the Traefik
    # ingress) is preserved instead of leaking the internal :8080.
    absolute_redirect off;

    # Serve precompressed .gz produced at build time (gzip_static is built into
    # the official nginx image). Fall back to on-the-fly gzip otherwise.
    gzip_static on;
    gzip            on;
    gzip_vary       on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Keep file descriptors + metadata hot in memory.
    open_file_cache          max=1000 inactive=60s;
    open_file_cache_valid    60s;
    open_file_cache_min_uses 1;
    open_file_cache_errors   on;

    # Security / hygiene headers (cheap, no runtime cost).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Liveness/readiness endpoint - no access logging. Probed pod-directly.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Bare /syncdeck -> ensure a trailing slash so relative asset URLs resolve.
    location = /syncdeck {
        return 301 /syncdeck/;
    }

    # Fonts are content-addressed at build time -> cache forever.
    location /syncdeck/fonts/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # The HTML is the deploy unit; let clients revalidate so deploys go live fast.
    location = /syncdeck/ {
        add_header Cache-Control "no-cache";
        try_files /syncdeck/index.html =404;
    }

    location /syncdeck/ {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /syncdeck/index.html;
    }

    # Root redirect convenience (optional): / -> /syncdeck/
    location = / {
        return 302 /syncdeck/;
    }
}
