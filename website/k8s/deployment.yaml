apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncdeck-web
  labels:
    app: syncdeck-web
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: syncdeck-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: syncdeck-web
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      # Copy the baked site into a RAM-backed (tmpfs) volume so every request
      # is served straight from memory.
      initContainers:
        - name: load-into-ram
          image: syncdeck-web:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "cp -a /usr/share/nginx/html/. /site/"]
          volumeMounts:
            - { name: site-ram, mountPath: /site }
          resources:
            requests: { cpu: "10m", memory: "16Mi" }
            limits:   { cpu: "100m", memory: "64Mi" }
      containers:
        - name: nginx
          image: syncdeck-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8080 }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: "10m", memory: "24Mi" }
            limits:   { cpu: "200m", memory: "96Mi" }
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 15
          volumeMounts:
            - { name: site-ram, mountPath: /usr/share/nginx/html, readOnly: true }
            - { name: tmp, mountPath: /tmp }
            - { name: nginx-cache, mountPath: /var/cache/nginx }
      volumes:
        - name: site-ram
          emptyDir: { medium: Memory, sizeLimit: 16Mi }
        - name: tmp
          emptyDir: { medium: Memory, sizeLimit: 8Mi }
        - name: nginx-cache
          emptyDir: { medium: Memory, sizeLimit: 8Mi }
