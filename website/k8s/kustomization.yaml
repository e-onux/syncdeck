apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Apply everything with:  kubectl apply -k k8s/
#
# Lives in the SAME namespace as the main sidrelabs-web site so the two can
# share the sidrelabs.com host (an Ingress can only target Services in its own
# namespace). Adjust if your panel project uses a different namespace.
namespace: sidrelabs-web

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml

# Image is built locally and imported straight into k3s containerd
# (docker save | k3s ctr images import) — no registry, matching how the main
# sidrelabs-web image is loaded. imagePullPolicy is IfNotPresent. Bump the tag
# per release and re-import.
images:
  - name: syncdeck-web
    newTag: "1"
