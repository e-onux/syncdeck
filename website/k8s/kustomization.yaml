apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Apply everything with:  kubectl apply -k k8s/
#
# Lives in the SAME namespace as the main sidrelabs-web site so the two can
# share the sidrelabs.com host (an Ingress can only target Services in its own
# namespace). Adjust if your panel project uses a different namespace.
namespace: sidrelabs-web

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml

# Pin the deployed image to an immutable tag per release, e.g.:
#   images:
#     - name: syncdeck-web
#       newName: registry.sidrelabs.com/syncdeck-web
#       newTag: "2026-06-17"
images:
  - name: syncdeck-web
    newName: registry.sidrelabs.com/syncdeck-web
    newTag: "2026-06-17"
